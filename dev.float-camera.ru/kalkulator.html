<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рассчитать стоимость | Miracle</title>
    <link rel="icon" href="https://float-camera.ru/favicon.ico" type="image/x-icon">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { text-align: center; color: #00695c; margin-top: 0; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; background: #d81b60; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 10px; }
        .btn:hover { background: #ad1457; }
        .legal { font-size: 0.8em; color: #666; margin-top: 15px; display: flex; align-items: flex-start; gap: 10px; }
        .legal input { margin-top: 3px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #777; text-decoration: none; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Рассчитать стоимость</h2>
    <p style="text-align:center; color:#555;">Оставьте номер, мы перезвоним и назовем точную цену под ваши размеры.</p>
    
    <form action="send.php" method="POST">
        <input type="text" name="name" placeholder="Ваше имя" required>
        <input type="tel" name="phone" placeholder="Ваш телефон" required>
        
        <!-- Галочка согласия (Закон 152-ФЗ) -->
        <div class="legal">
            <input type="checkbox" name="agree" id="agree" checked required>
            <label for="agree">Я даю согласие на обработку <a href="privacy.html" target="_blank">персональных данных</a></label>
        </div>

        <button type="submit" class="btn">Жду звонка</button>
    </form>

    <a href="index.html" class="back-link">← Вернуться на сайт</a>
</div>

</body>
</html>
