    <b><center><h1>Большой Банный Форум Сочи 2014</h1></b></center>
С 12 по 15 июня 2014 в Сочи на горном курорте Роза Хутор проходил большой банный форум и 
выставка-ярмарка “Народное здоровье”, в которой мы принимали участие с флоат-камерой "Miracle".
